<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jessica Chi 紀蘊倢｜自我介紹主頁</title>
    <style>
      :root {
        --paper: #f6f6f6;
        --paper-dark: #ececec;
        --ink: #121212;
        --ink-soft: #3a3a3a;
        --line: #6e6e6e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #d9d9d9;
        color: var(--ink);
        font-family: "Noto Serif TC", "PMingLiU", "MingLiU", "Times New Roman", serif;
      }

      .paper {
        max-width: 1160px;
        margin: 24px auto;
        border: 2px solid var(--line);
        background: var(--paper);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.16);
      }

      .masthead {
        padding: 20px 24px 14px;
        border-bottom: 2px solid var(--line);
      }

      .masthead h1 {
        margin: 0;
        letter-spacing: 0.08em;
        font-size: clamp(1.6rem, 4vw, 2.5rem);
      }

      .masthead p {
        margin: 8px 0 0;
        color: var(--ink-soft);
      }

      .sliding-bar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        gap: 10px;
        overflow-x: auto;
        white-space: nowrap;
        padding: 10px 12px;
        border-top: 1px solid var(--line);
        border-bottom: 2px solid var(--line);
        background: linear-gradient(180deg, #f0f0f0 0%, var(--paper-dark) 100%);
      }

      .tab {
        text-decoration: none;
        color: var(--ink);
        border: 1px solid var(--line);
        padding: 8px 14px;
        min-width: max-content;
        background: #fff;
      }

      .tab:hover {
        background: #e8e8e8;
      }

      .content-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(160px, 1fr));
        gap: 14px;
        padding: 16px;
      }

      .card {
        border: 1px solid var(--line);
        background: #fff;
        padding: 12px;
      }

      .card h2,
      .card h3 {
        margin: 0 0 10px;
        font-size: 1.02rem;
        line-height: 1.4;
      }

      .card img {
        width: 100%;
        aspect-ratio: 4 / 5;
        object-fit: cover;
        border: 1px solid #9b9b9b;
        margin-bottom: 8px;
      }

      .caption {
        margin: 0;
        font-size: 0.9rem;
        color: var(--ink-soft);
      }

      .achievements {
        margin: 0 16px 16px;
      }

      .achievements h2 {
        margin: 0 0 10px;
      }

      .achievements ul {
        margin: 0;
        padding-left: 20px;
        line-height: 1.8;
      }

      @media (max-width: 1100px) {
        .content-grid {
          grid-template-columns: repeat(3, minmax(160px, 1fr));
        }
      }

      @media (max-width: 760px) {
        .content-grid {
          grid-template-columns: repeat(2, minmax(160px, 1fr));
        }
      }

      @media (max-width: 520px) {
        .content-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="paper" id="home">
      <header class="masthead">
        <h1>Jessica Chi 紀蘊倢</h1>
        <p>自我介紹專欄｜以黑白報紙風格記錄我在辯論、交流、舞蹈、科學與創意上的學習旅程。</p>
      </header>

      <nav class="sliding-bar" aria-label="主題導覽">
        <a class="tab" href="#debate">英語辯論</a>
        <a class="tab" href="#global">國際交流</a>
        <a class="tab" href="#dance">舞蹈表演</a>
        <a class="tab" href="#science">科學探索</a>
        <a class="tab" href="#innovation">創新設計</a>
        <a class="tab" href="#home">回到主頁</a>
      </nav>

      <section class="content-grid">
        <article class="card" id="debate">
          <h3>在辯論中擁抱未知</h3>
          <img src="2C420FE4-2A4C-4CAD-B0A7-4FBC50CF4869.JPG" alt="英語辯論主題照片" />
          <p class="caption">英語辯論</p>
        </article>

        <article class="card" id="global">
          <h3>從校園交流到國際對話</h3>
          <img src="截圖 2026-04-05 下午6.56.53.png" alt="國際交流主題照片，聚焦黑色衣服笑著的女孩" style="object-position: center 30%;" />
          <p class="caption">國際交流</p>
        </article>

        <article class="card" id="dance">
          <h3>熱愛與自我回聲</h3>
          <img src="IMG_1890.JPG" alt="舞蹈表演主題照片" />
          <p class="caption">舞蹈表演</p>
        </article>

        <article class="card" id="science">
          <h3>好奇心的反應式</h3>
          <img src="IMG_0388.heic" alt="科學探索主題照片" />
          <p class="caption">科學探索</p>
        </article>

        <article class="card" id="innovation">
          <h3>思考、觀察與創意</h3>
          <img src="IMG_0562.JPG" alt="創新設計主題照片" />
          <p class="caption">創新設計</p>
        </article>
      </section>

      <section class="card achievements" aria-label="特殊優良表現">
        <h2>特殊優良表現</h2>
        <ul>
          <li>115學年度 國泰卓越獎助計畫 獲獎者</li>
          <li>114學年度 臺灣 辯士成就獎（Debater of the Year）</li>
          <li>114學年度 臺北市 優良學生</li>
          <li>113學年度 北一女中 學生議會議長</li>
        </ul>
      </section>
    </main>
  </body>
</html>
